name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: eu-central-1
  AWS_ROLE_ARN: arn:aws:iam::730747453261:role/github-actions-deploy

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Build web
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: web/terraform
        run: terraform init

      - name: Terraform fmt
        working-directory: web/terraform
        run: terraform fmt -check -recursive

      - name: Terraform validate
        working-directory: web/terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: web/terraform
        run: terraform plan -out=tfplan

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: web/terraform/tfplan

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Download Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: web/terraform

      - name: Terraform init
        working-directory: web/terraform
        run: terraform init

      - name: Terraform apply
        working-directory: web/terraform
        run: terraform apply -auto-approve tfplan

      - name: Deploy web
        run: echo "Deploy web app here"

      - name: Invalidate caches
        run: echo "Invalidate CDN/cache here"

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Smoke tests
        run: echo "Add smoke tests here"
