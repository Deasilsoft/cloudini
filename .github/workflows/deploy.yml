name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      VITE_SITE_URL: ${{ vars.VITE_SITE_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Build web app
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::730747453261:role/github-actions-deploy
          aws-region: eu-north-1

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: web/terraform
        run: terraform init -input=false

      - name: Terraform format check
        working-directory: web/terraform
        run: terraform fmt -check -recursive

      - name: Terraform validate
        working-directory: web/terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: web/terraform
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        working-directory: web/terraform
        run: terraform apply -input=false -auto-approve tfplan

      - name: Read Terraform outputs
        id: terraform_outputs
        working-directory: web/terraform
        run: |
          echo "bucket_uri=$(terraform output -raw bucket_uri)" >> "$GITHUB_OUTPUT"
          echo "cloudfront_distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "cloudfront_domain_name=$(terraform output -raw cloudfront_domain_name)" >> "$GITHUB_OUTPUT"

      - name: Deploy static assets to S3
        run: |
          aws s3 sync web/dist/assets "${{ steps.terraform_outputs.outputs.bucket_uri }}/assets" \
            --delete \
            --cache-control "public,max-age=31536000,immutable"

      - name: Deploy HTML and metadata to S3
        run: |
          aws s3 sync web/dist "${{ steps.terraform_outputs.outputs.bucket_uri }}" \
            --delete \
            --exclude "assets/*" \
            --cache-control "no-cache"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.terraform_outputs.outputs.cloudfront_distribution_id }}" \
            --paths "/" "/index.html" "/sitemap*" "/robots.txt"

      - name: Smoke test deployment
        run: |
          curl --fail --silent --show-error \
            "https://${{ steps.terraform_outputs.outputs.cloudfront_domain_name }}" > /dev/null
